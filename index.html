<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Compre os melhores tênis e sneakers online na SyntaxWear. Encontre modelos esclusivos, preços imperdiveis e frete grátis para todo o Brasil." />

    <title>SyntaxWear - Tênis e Sneakers</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/components/header.css" />
    <link rel="stylesheet" href="./css/components/hero.css" />
    <link rel="stylesheet" href="./css/components/products-category.css">
    <link rel="stylesheet" href="./css/components/grid.css">
    <link rel="stylesheet" href="./css/responsive.css" />
</head>
<body>
    <header class="header">
        <h1 class="logo">
            <a href="/" title="SyntaxWear - Tênis e Sneakers">
                <img src="./assets/images/logos/Logo.svg" alt="SyntaxWear - Tênis e Sneakers">
            </a>
        </h1>
        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outilet</a></li>
            </ul>
        </nav>
        <nav class="nav-right" aria-label="Acesso Rapido">
            <ul>
                <li><a href="#">Nossas lojas</a></li>
                <li><a href="#">Sobre</a></li>
                <li>
                    <a href="#" aria-label="Minha conta">
                        <img src="./assets/images/icons/user.svg" alt="Minha conta">
                    </a>
                </li>
                <li>
                    <a href="#" aria-label="Ajuda">
                        <img src="./assets/images/icons/help.svg" alt="Ajuda">
                    </a>
                </li>
                <li>
                    <a href="#" aria-label="Carrinho">
                        <img src="./assets/images/icons/bag.svg" alt="carrinho">
                    </a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="hero-section">
            <div class="hero-overlay">
                <div class="hero-content">
                    <span class="hero-subititle">Krypton One</span>
                    <h2 class="hero-title">Transforme qualquer passo em presemça.</h2>
                    <div class="hero-buttons">
                        <a class="btn btn-outiline" href="#">Ver modelo</a>
                        <a class="btn btn-filled" href="#">Comprar</a>
                    </div>
                </div>
            </div>
        </section>
        <section class="categories-section">
                <div class="category-card casual">
                    <a href="#" class="category-link">
                        <span class="overlay"></span>
                        <span class="category-name btn btn-outiline">Casual</span>
                    </a>
                </div>
                <div class="category-card esporte">
                    <a href="#" class="category-link">
                        <span class="overlay"></span>
                        <span class="category-name btn btn-outiline">Esporte</span>
                    </a>
                </div>
                <div class="category-card moderno">
                    <a href="#" class="category-link">
                        <span class="overlay"></span>
                        <span class="category-name btn btn-outiline">Moderno</span>
                    </a>
                </div>
                <div class="category-card futurista">
                    <a href="#" class="category-link">
                        <span class="overlay"></span>
                        <span class="category-name btn btn-outiline">Futurista</span>
                    </a>
                </div>
        </section>
        <section class="grid-section">
            <div class="card top1">
                <div class="top1-content">
                    <h3 class="card-tittle">Krypton One</h3>
                    <p class="card-subititle">Estilo Urbano com atitude</p>
                    <div class="cta-group">
                        <a href="#" class=" btn btn-outiline">Feminino</a>
                        <a href="#" class="btn btn-outiline">Masculino</a>
                    </div>
                </div>
            </div>
            <div class="card top2"></div>
            <div class="card midL"></div>
            <div class="card midR"></div>
            <div class="card bottomL"></div>
            <div class="card bottomR"></div>
        </section>
    </main>
    <footer class="site-footer"></footer>
</body>
</html>
